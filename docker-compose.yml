# ShareTube — production Docker Compose (Coolify-ready + plain `docker compose`).
# Only the `app` service is published (port 8989 + domain via reverse proxy).
# postgres, redis, xray and the optional local bot api are NEVER exposed to the internet.
#
# Env source:
#   - plain docker compose: values come from a local `.env` (auto-loaded for ${VAR}).
#   - Coolify: values come from the resource's Environment Variables (injected).
# No service depends on an `.env` FILE being present inside the build — everything is
# passed explicitly via `environment` below, so it works in both modes.

x-app-env: &app-env
  ENV: ${ENV:-prod}
  APP_PORT: ${APP_PORT:-8989}
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://sharetube.appswire.ru}
  SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_JSON: ${LOG_JSON:-true}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-sharetube}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sharetube}}
  DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:-postgresql+psycopg2://${POSTGRES_USER:-sharetube}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sharetube}}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
  BOT_USERNAME: ${BOT_USERNAME:-sharetube_bot}
  TELEGRAM_USE_WEBHOOK: ${TELEGRAM_USE_WEBHOOK:-false}
  TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
  TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
  TELEGRAM_API_BASE: ${TELEGRAM_API_BASE:-https://api.telegram.org}
  TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-socks5://amneziawg:1080}
  LOCAL_BOT_API_ENABLED: ${LOCAL_BOT_API_ENABLED:-false}
  LOCAL_BOT_API_BASE: ${LOCAL_BOT_API_BASE:-http://telegram-bot-api:8081}
  TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
  TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
  CLOUD_BOT_SAFE_LIMIT_MB: ${CLOUD_BOT_SAFE_LIMIT_MB:-45}
  LOCAL_BOT_SAFE_LIMIT_MB: ${LOCAL_BOT_SAFE_LIMIT_MB:-1900}
  MAX_DOWNLOAD_SIZE_MB: ${MAX_DOWNLOAD_SIZE_MB:-10000}
  DOWNLOAD_LINK_TTL_HOURS: ${DOWNLOAD_LINK_TTL_HOURS:-24}
  MAX_ACTIVE_JOBS_PER_USER: ${MAX_ACTIVE_JOBS_PER_USER:-2}
  MAX_QUEUED_JOBS_PER_USER: ${MAX_QUEUED_JOBS_PER_USER:-5}
  MAX_GLOBAL_DOWNLOADS: ${MAX_GLOBAL_DOWNLOADS:-3}
  MAX_GLOBAL_TRANSCODES: ${MAX_GLOBAL_TRANSCODES:-1}
  MAX_PLAYLIST_ITEMS: ${MAX_PLAYLIST_ITEMS:-20}
  JOB_TIMEOUT_MINUTES: ${JOB_TIMEOUT_MINUTES:-120}
  MAX_URL_LENGTH: ${MAX_URL_LENGTH:-2048}
  PLAYLISTS_ENABLED: ${PLAYLISTS_ENABLED:-false}
  STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
  STORAGE_DIR: ${STORAGE_DIR:-/data/storage}
  TMP_DIR: ${TMP_DIR:-/data/tmp}
  MAX_STORAGE_GB: ${MAX_STORAGE_GB:-5}
  DOWNLOAD_RATE_LIMIT_KBPS: ${DOWNLOAD_RATE_LIMIT_KBPS:-0}
  S3_ENDPOINT: ${S3_ENDPOINT:-}
  S3_BUCKET: ${S3_BUCKET:-}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-}
  OUTBOUND_REQUIRED: ${OUTBOUND_REQUIRED:-true}
  XRAY_SOCKS_URL: ${XRAY_SOCKS_URL:-socks5h://amneziawg:1080}
  XRAY_BACKUP_SOCKS_URL: ${XRAY_BACKUP_SOCKS_URL:-socks5h://xray:1080}
  YTDLP_PROXY_URL: ${YTDLP_PROXY_URL:-}
  GALLERY_DL_PROXY_URL: ${GALLERY_DL_PROXY_URL:-}
  DIRECT_DOWNLOAD_PROXY_URL: ${DIRECT_DOWNLOAD_PROXY_URL:-}
  NO_PROXY: ${NO_PROXY:-127.0.0.1,localhost,postgres,redis,xray,telegram-bot-api}
  DOMAIN_ALLOWLIST: ${DOMAIN_ALLOWLIST:-}
  DOMAIN_DENYLIST: ${DOMAIN_DENYLIST:-}
  MAX_REDIRECTS: ${MAX_REDIRECTS:-5}
  RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-30}
  ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-12}
  CORS_ORIGINS: ${CORS_ORIGINS:-https://sharetube.appswire.ru}
  SENTRY_DSN: ${SENTRY_DSN:-}
  PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-false}

x-app-image: &app-image
  build:
    context: .
    dockerfile: apps/backend/Dockerfile
  image: sharetube-app:latest
  environment: *app-env
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sharetube}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sharetube}
    volumes:
      - st_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sharetube}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [st_net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - st_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [st_net]

  xray:
    build:
      context: .
      dockerfile: services/xray/Dockerfile
    image: sharetube-xray:latest
    restart: unless-stopped
    environment:
      XRAY_OUTBOUND_URI: ${XRAY_OUTBOUND_URI:-}
      XRAY_CONFIG_JSON: ${XRAY_CONFIG_JSON:-}
    networks: [st_net]

  # AmneziaWG (obfuscated WireGuard) userspace SOCKS5 gateway — no TUN/priv needed.
  # Primary outbound when the plain Xray/Reality route is throttled by the upstream.
  amneziawg:
    build:
      context: .
      dockerfile: services/amneziawg/Dockerfile
    image: sharetube-amneziawg:latest
    restart: unless-stopped
    environment:
      # base64 of the AmneziaWG client config (kept out of git; set in .env / Coolify)
      AWG_CONFIG: ${AWG_CONFIG:-}
    networks: [st_net]

  app:
    <<: *app-image
    command: ["api"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    ports:
      - "${APP_PORT:-8989}:8989"
    volumes:
      - st_storage:/data/storage
      - st_tmp:/data/tmp
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8989/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks: [st_net]

  worker:
    <<: *app-image
    command: ["worker"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      xray: {condition: service_started}
      amneziawg: {condition: service_started}
    volumes:
      - st_storage:/data/storage
      - st_tmp:/data/tmp
    networks: [st_net]

  bot:
    <<: *app-image
    command: ["bot"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      app: {condition: service_started}
    networks: [st_net]

  # Optional Local Bot API server. Enable with: docker compose --profile localbotapi up
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    profiles: ["localbotapi"]
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_LOCAL: "1"
    command: ["--local", "--dir=/data/storage"]
    volumes:
      - st_storage:/data/storage
      - st_botapi:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/ || true"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [st_net]

volumes:
  st_pgdata:
  st_redis:
  st_storage:
  st_tmp:
  st_botapi:

networks:
  st_net:
    driver: bridge
    driver_opts:
      # Lower MTU avoids a black-hole on the Xray/Reality tunnel where small
      # payloads pass but large transfers stall (broken path-MTU discovery upstream).
      com.docker.network.driver.mtu: "1400"
